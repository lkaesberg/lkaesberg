<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Solar System Fun Facts 🚀</title>
  <link rel="stylesheet" href="css/styles.css?v=20260403-solar-fix2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <meta name="description" content="Interactive 3D solar system with fun facts about the planets.">
</head>
<body>
  <!-- Background Elements -->
  <div class="stars-container"></div>
  
  <!-- Three.js Canvas Container -->
  <div id="canvas-container" class="fade-in-element"></div>
  
  <!-- SVG line for connecting the panel to the planet -->
  <svg class="zoom-line">
    <line x1="0" y1="0" x2="0" y2="0" stroke="white" stroke-width="1" opacity="0.7" />
  </svg>
  
  <!-- Back to Main Site Button -->
  <a href="index.html" class="back-to-main" title="Back to main site">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span>Back to Main Site</span>
  </a>

  <!-- UI Layer -->
  <div class="ui-layer">
    <!-- Header -->
    <div class="header fade-in-element">
      <div class="header-top">
        <h1>🚀 Solar System Fun Facts</h1>
        <!-- Mobile Menu Toggle Button -->
        <button class="menu-toggle" aria-label="Toggle Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <p>Explore the planets and discover surprising facts about our cosmic neighborhood.</p>
      
        <!-- Navigation Menu -->
        <div class="nav-menu">
          <div class="nav-item" data-planet="Mercury">
            <span class="planet-name">Mercury</span>
          </div>
          <div class="nav-item" data-planet="Venus">
            <span class="planet-name">Venus</span>
          </div>
          <div class="nav-item" data-planet="Earth">
            <span class="planet-name">Earth</span>
          </div>
          <div class="nav-item" data-planet="Mars">
            <span class="planet-name">Mars</span>
          </div>
          <div class="nav-item" data-planet="Jupiter">
            <span class="planet-name">Jupiter</span>
          </div>
          <div class="nav-item" data-planet="Saturn">
            <span class="planet-name">Saturn</span>
          </div>
          <div class="nav-item" data-planet="Uranus">
            <span class="planet-name">Uranus</span>
          </div>
          <div class="nav-item" data-planet="Neptune">
            <span class="planet-name">Neptune</span>
          </div>
        </div>
    </div>
    
    <!-- Back Button -->
    <button class="back-button">Return to Solar System</button>
    
    <!-- Content Panel -->
    <div class="content-panel">
      <div class="panel-header">
        <h2 class="content-title"></h2>
        <div class="close-button"></div>
      </div>
      <div class="panel-content">
        <div class="content-body"></div>
      </div>
      <div class="panel-glow"></div>
      <div class="inner-reflection"></div>
      <div class="panel-accent"></div>
      <div class="panel-accent-dot"></div>
    </div>
    
    <!-- Planet Tooltip -->
    <div class="planet-tooltip"></div>
    
    <!-- Spaceship Alert -->
    <div id="spaceship-alert"></div>
    
     <!-- Controls Info -->
     <div class="controls-info">
       <div class="control-item">
         <span class="key">Mouse</span>
         <span class="action">Orbit View</span>
       </div>
       <div class="control-item">
         <span class="key">Click</span>
         <span class="action">Planet Facts</span>
       </div>
       <div class="control-item">
         <span class="key">ESC</span>
         <span class="action">Back</span>
       </div>
     </div>
  </div>
  
  <!-- Three.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
  
  <!-- GLTFLoader (for loading the rocket model) -->
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
  
  <!-- Application Scripts -->
  <script type="module" src="js/main.js?v=20260403-solar-fix2"></script>
</body>
</html>
